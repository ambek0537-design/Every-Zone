user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off; # Security: Hide Nginx version

    # --- Compression (Gzip) ---
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # --- Rate Limiting Zones ---
    # Allow 10 requests per second per IP for standard API requests
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    
    # Allow 2 requests per second per IP for authentication and upload endpoints
    limit_req_zone $binary_remote_addr zone=auth_upload_limit:10m rate=2r/s;

    # Load default site configurations
    include /etc/nginx/conf.d/*.conf;
}
