version: '3.8'

services:
  # Nginx Gateway (SSL Termination, Rate Limiting, Compression & Dynamic Routing)
  nginx:
    image: nginx:alpine
    container_name: everyzone-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - ./docker/nginx/logs:/var/log/nginx
    depends_on:
      - api
      - admin-api
    networks:
      - everyzone-network
    restart: always

  # Primary API Service (NestJS Full-stack App)
  api:
    build:
      context: .
      dockerfile: ./docker/api/Dockerfile
    container_name: everyzone-api
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://everyzone_user:everyzone_secure_pass@postgres:5432/everyzone_db?schema=public
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=EveryZone_SuperSecretKey_2026_JWT
      - CHAPA_SECRET_KEY=CHASECK_TEST-everyzone_xxxxxxxxxxxxxx
      - AWS_SECRET=everyzone_aws_secure_s3_secret
      - CLOUDINARY_SECRET=everyzone_cloudinary_cdn_secret
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - everyzone-network
    restart: always

  # Admin API Service (Specialized high-privilege dashboard and internal control APIs)
  admin-api:
    build:
      context: .
      dockerfile: ./docker/admin-api/Dockerfile
    container_name: everyzone-admin-api
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://everyzone_user:everyzone_secure_pass@postgres:5432/everyzone_db?schema=public
      - REDIS_URL=redis://redis:6379/1
      - JWT_SECRET=EveryZone_Admin_SuperSecretKey_2026_JWT
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - everyzone-network
    restart: always

  # BullMQ Background Job Workers (Video processing, daily optimization, emails, analytics)
  worker:
    build:
      context: .
      dockerfile: ./docker/worker/Dockerfile
    container_name: everyzone-worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://everyzone_user:everyzone_secure_pass@postgres:5432/everyzone_db?schema=public
      - REDIS_URL=redis://redis:6379/0
      - AWS_SECRET=everyzone_aws_secure_s3_secret
    depends_on:
      - postgres
      - redis
    networks:
      - everyzone-network
    restart: always

  # Primary PostgreSQL Relational Database with persistent volume storage
  postgres:
    image: postgres:15-alpine
    container_name: everyzone-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=everyzone_user
      - POSTGRES_PASSWORD=everyzone_secure_pass
      - POSTGRES_DB=everyzone_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - everyzone-network
    restart: always

  # High-performance Redis Cache, Rate Limiting, and BullMQ Session store
  redis:
    image: redis:7-alpine
    container_name: everyzone-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass everyzone_redis_pass_2026
    networks:
      - everyzone-network
    restart: always

networks:
  everyzone-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
